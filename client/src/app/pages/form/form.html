<div class="search-container">
  <div class="search-card">
    <h2 class="title">IGNOU Grade Card Checker</h2>
    <p class="subtitle">Check your academic performance instantly</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="search-form">
      <!-- Program -->
      <div class="form-group">
        <label for="program">Program</label>
        <select id="program" formControlName="program">
          <option value="">Select Program</option>
          <option value="BCA">BCA</option>
          <option value="BCAOL">BCAOL</option>
          <option value="BCA_NEW">BCA_NEW</option>
          <option value="BCA_NEWOL">BCA_NEWOL</option>
          
          <option value="MCA">MCA</option>
          <option value="MCA_NEW">MCA_NEW</option>
          <option value="MCAOL">MCAOL</option>
          <option value="MCA_NEWOL">MCA_NEWOL</option>
        </select>
      </div>

      <!-- Enrollment -->
      <div class="form-group">
        <label for="enrollment">Enrollment Number</label>
        <input
          id="enrollment"
          type="text"
          placeholder="Enter 10 digit enrollment number"
          formControlName="enrollment"
        />
      </div>

      <!-- Button -->
      <button type="submit" class="search-btn" [disabled]="form.invalid">Search Grade Card</button>
    </form>
  </div>
</div>
